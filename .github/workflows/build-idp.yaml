name: Build & Push IdP

on:
  push:
    tags:
      - 'idp-v*'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#idp-}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: idp
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/privasys/idp:${{ steps.meta.outputs.version }}
            ghcr.io/privasys/idp:latest
          labels: |
            org.opencontainers.image.source=https://github.com/Privasys/identity-platform
            org.opencontainers.image.description=Privasys IdP — OIDC + FIDO2 authorization server
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}

      - name: Print image digest
        run: |
          echo "Image pushed:"
          echo "  ghcr.io/privasys/idp:${{ steps.meta.outputs.version }}"
          echo "  ghcr.io/privasys/idp:latest"
