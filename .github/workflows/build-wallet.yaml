#
# Privasys Wallet — Full CI/CD pipeline
#
# Builds the Rust native RA-TLS library for iOS & Android,
# then builds the Expo app with EAS Build (cloud) or locally
# on GitHub Actions macOS runners.
#
# Triggers:
#   - Push to main (full build + deploy)
#   - Pull requests (type-check + lint only)
#   - Manual dispatch (choose platform + profile)

name: Build Wallet

on:
  push:
    tags:
      - 'wallet-v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options: [ios, android, all]
      profile:
        description: 'EAS build profile'
        required: true
        default: 'development'
        type: choice
        options: [development, preview, staging, production]
      use_eas_cloud:
        description: 'Use EAS Cloud Build (vs local GitHub Actions runner)'
        required: true
        default: true
        type: boolean

env:
  RUST_TOOLCHAIN: stable
  NODE_VERSION: '24'
  BUN_VERSION: '1.3.11'
  # Pre-built Rust RA-TLS FFI libraries are downloaded from this release of
  # https://github.com/Privasys/ra-tls-clients instead of being recompiled
  # on every wallet build. Bump when ra-tls-clients ships a new version.
  # v0.4.3 advertises [privasys-ratls/1, http/1.1] only — h2 was dropped
  # in v0.4.3 because both clients speak HTTP/1.1 only (Rust uses ureq,
  # Go writes HTTP/1.1 manually) and Caddy preferred h2 → connection
  # closed mid-request on /__privasys/session-bootstrap (wallet 1.2.16).
  RATLS_VERSION: v0.4.4

jobs:
  # ─── Type-check & lint (runs on all PRs) ──────────────────────────
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies
        working-directory: wallet
        run: bun install --frozen-lockfile
      - name: Type-check
        working-directory: wallet
        run: bunx tsc --noEmit
      - name: Type-check SDK
        working-directory: sdk
        run: |
          bun install --frozen-lockfile
          bunx tsc --noEmit

  # ─── Build Rust RA-TLS native libraries ───────────────────────────
  # Removed: pre-built artefacts are now consumed directly from
  # https://github.com/Privasys/ra-tls-clients releases (env.RATLS_VERSION).
  # See the "Download Rust ... artefacts" step inside build-local-ios /
  # build-local-android below.

  # ─── Build app via EAS Cloud ──────────────────────────────────────
  # NOTE: EAS Cloud builds clone from git, so pre-built Rust binaries
  # must be committed to the repo for this path to work. Use local
  # builds (below) when Rust artifacts are provided by prior CI steps.
  build-eas-cloud:
    if: >
      github.event_name == 'workflow_dispatch' && inputs.use_eas_cloud
    needs: [check]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: ${{ inputs.platform == 'all' && fromJSON('["ios", "android"]') || fromJSON(format('["{0}"]', inputs.platform)) }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        working-directory: wallet
        run: bun install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build with EAS Cloud
        working-directory: wallet
        run: |
          eas build \
            --platform ${{ matrix.platform }} \
            --profile "${{ inputs.profile }}" \
            --non-interactive \
            --no-wait

  # ─── Build app locally on GitHub Actions runner ───────────────────
  # Uses pre-built Rust artifacts from prior jobs. This is the default
  # path for push-to-main and for manual dispatch without EAS Cloud.
  build-local-ios:
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       !inputs.use_eas_cloud &&
       (inputs.platform == 'ios' || inputs.platform == 'all'))
    needs: [check]
    runs-on: macos-26  # Xcode 26 — ships iOS 26 SDK
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Download Rust iOS artefacts from ra-tls-clients release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p wallet/modules/native-ratls/ios/lib
          cd wallet/modules/native-ratls/ios/lib
          gh release download "$RATLS_VERSION" \
            --repo Privasys/ra-tls-clients \
            --pattern 'ratls-mobile-ios.tar.gz' \
            --output ratls-mobile-ios.tar.gz
          tar -xzf ratls-mobile-ios.tar.gz
          rm ratls-mobile-ios.tar.gz
          ls -la
          test -f libratls_mobile.a

      - name: Stage artefacts for EAS tarball
        run: |
          # Force-track and commit so the EAS source tarball includes them
          # (gitignored files are excluded from the EAS archive)
          git add -f wallet/modules/native-ratls/ios/lib/
          git -c user.name='CI' -c user.email='ci@privasys.org' commit -m 'ci: add Rust iOS artifacts [skip ci]'

      - name: Install dependencies
        working-directory: wallet
        run: bun install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Build iOS locally
        working-directory: wallet
        env:
          EXPO_PUBLIC_OAUTH_GOOGLE_CLIENT_ID_IOS: ${{ secrets.OAUTH_GOOGLE_CLIENT_ID_IOS }}
          EXPO_PUBLIC_OAUTH_MICROSOFT_CLIENT_ID: ${{ secrets.OAUTH_MICROSOFT_CLIENT_ID }}
        run: |
          PROFILE="${{ inputs.profile || 'production' }}"
          eas build \
            --platform ios \
            --profile "$PROFILE" \
            --local \
            --non-interactive \
            --output build/wallet-ios.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: wallet-ios-${{ inputs.profile || 'production' }}
          path: wallet/build/wallet-ios.ipa
          retention-days: 30

  build-local-android:
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       !inputs.use_eas_cloud &&
       (inputs.platform == 'android' || inputs.platform == 'all'))
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download Rust Android artefacts from ra-tls-clients release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p wallet/modules/native-ratls/android/src/main/jniLibs
          cd wallet/modules/native-ratls/android/src/main/jniLibs
          gh release download "$RATLS_VERSION" \
            --repo Privasys/ra-tls-clients \
            --pattern 'ratls-mobile-android.tar.gz' \
            --output ratls-mobile-android.tar.gz
          tar -xzf ratls-mobile-android.tar.gz
          rm ratls-mobile-android.tar.gz
          echo "=== jniLibs contents ==="
          find . -type f
          test -f arm64-v8a/libratls_mobile.so
          test -f x86_64/libratls_mobile.so

      - name: Stage artefacts for EAS tarball
        run: |
          # Force-track and commit so the EAS source tarball includes them
          # (gitignored files are excluded from the EAS archive)
          git add -f wallet/modules/native-ratls/android/src/main/jniLibs/
          git -c user.name='CI' -c user.email='ci@privasys.org' commit -m 'ci: add Rust Android artifacts [skip ci]'

      - name: Install dependencies
        working-directory: wallet
        run: bun install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android locally
        working-directory: wallet
        env:
          EXPO_PUBLIC_OAUTH_GOOGLE_CLIENT_ID_ANDROID: ${{ secrets.OAUTH_GOOGLE_CLIENT_ID_ANDROID }}
          EXPO_PUBLIC_OAUTH_MICROSOFT_CLIENT_ID: ${{ secrets.OAUTH_MICROSOFT_CLIENT_ID }}
        run: |
          PROFILE="${{ inputs.profile || 'production' }}"
          eas build \
            --platform android \
            --profile "$PROFILE" \
            --local \
            --non-interactive \
            --output build/wallet-android.aab

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: wallet-android-${{ inputs.profile || 'production' }}
          path: wallet/build/wallet-android.aab
          retention-days: 30

  # ─── Submit to TestFlight ─────────────────────────────────────────
  submit-testflight:
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       !inputs.use_eas_cloud &&
       (inputs.platform == 'ios' || inputs.platform == 'all'))
    needs: [build-local-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: wallet-ios-${{ inputs.profile || 'production' }}
          path: wallet/build/

      - name: Install dependencies
        working-directory: wallet
        run: bun install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write App Store Connect API Key
        run: |
          mkdir -p keys
          echo "${{ secrets.ASC_API_KEY_P8_BASE64 }}" | base64 -d > keys/AuthKey_9H3WFH5GZY.p8

      - name: Submit to TestFlight
        working-directory: wallet
        run: |
          eas submit \
            --platform ios \
            --path build/wallet-ios.ipa \
            --non-interactive

  # ─── Submit to Google Play ────────────────────────────────────────
  # Runs on:
  #   - tag push (wallet-v*) — always treated as a production release
  #   - manual dispatch with profile=production and android in scope
  submit-google-play:
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/wallet-v')) ||
      (github.event_name == 'workflow_dispatch' &&
       !inputs.use_eas_cloud &&
       (inputs.platform == 'android' || inputs.platform == 'all') &&
       inputs.profile == 'production')
    needs: [build-local-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: wallet-android-${{ inputs.profile || 'production' }}
          path: wallet/build/

      - name: Install dependencies
        working-directory: wallet
        run: bun install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write Google Play service account key
        run: echo "$GOOGLE_PLAY_KEY" > wallet/google-play-key.json
        env:
          GOOGLE_PLAY_KEY: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_KEY }}

      - name: Submit to Google Play
        working-directory: wallet
        run: |
          eas submit \
            --platform android \
            --path build/wallet-android.aab \
            --non-interactive
