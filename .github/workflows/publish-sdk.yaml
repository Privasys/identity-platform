name: Publish SDK

on:
  push:
    tags:
      - 'sdk-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version to publish (e.g. 0.1.1)'
        required: true

permissions:
  contents: read
  packages: write
  id-token: write   # required for google-github-actions/auth WIF

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@privasys'

      - name: Install dependencies
        working-directory: sdk
        run: npm ci

      - name: Build
        working-directory: sdk
        run: npm run build

      - name: Verify build output
        working-directory: sdk
        run: |
          test -f dist/index.js
          test -f dist/index.d.ts
          test -f dist/privasys-auth.iife.js
          test -f dist/privasys-auth-frame.iife.js
          test -f dist/privasys-auth-client.iife.js

      - name: Publish to GHCR npm
        working-directory: sdk
        # Tolerate re-runs: if the version is already on the registry, npm
        # exits 1 with "cannot publish over the previously published versions".
        # We treat that as success so the post-publish frame-bundle deploy can
        # still execute (the deploy is the part that actually matters for
        # adopter sites).
        run: |
          set +e
          out=$(npm publish 2>&1)
          rc=$?
          echo "$out"
          if [ $rc -ne 0 ] && echo "$out" | grep -q "cannot publish over the previously published versions"; then
            echo "::notice::Version already published; continuing to deploy hosted bundle."
            exit 0
          fi
          exit $rc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---- Deploy hosted bundles to privasys.id (idp-fr-par-1) ----
      # Two bundles are served from https://privasys.id/auth/ and MUST be
      # redeployed on every SDK release so fixes ship to adopter sites
      # without requiring an IdP container rebuild:
      #
      #   * privasys-auth-frame.iife.js   — host bundle loaded INSIDE the
      #     iframe at privasys.id/auth/ (handles OIDC PKCE, postMessage
      #     handlers, etc.).
      #   * privasys-auth-client.iife.js  — parent-page bundle exporting
      #     `Privasys.AuthFrame`. Loaded as <script src> by static sites
      #     like explorer.privasys.org. Was previously not redeployed,
      #     causing the hosted copy to drift behind the SDK src (notably
      #     missing AuthFrame.getTokenForAudience added in sdk-v0.3.7).
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v3

      # NOTE: SSH into idp-fr-par-1 via IAP requires google-guest-agent to
      # be running on the VM (it provisions per-CI-run keys from project SSH
      # metadata into the runner user's authorized_keys). The agent is
      # enabled by default on GCE images; if it is ever disabled, every CI
      # SSH attempt fails with "Permission denied (publickey)" no matter
      # which username is used. See run 25766840278 for the original break.
      - name: Upload bundles to idp-fr-par-1
        run: |
          gcloud compute scp \
            sdk/dist/privasys-auth-frame.iife.js \
            sdk/dist/privasys-auth-frame.iife.js.map \
            sdk/dist/privasys-auth-client.iife.js \
            sdk/dist/privasys-auth-client.iife.js.map \
            idp-fr-par-1:/tmp/ \
            --project privasys-production \
            --zone europe-west9-a \
            --tunnel-through-iap \
            --scp-flag="-O"

      - name: Install bundles into /var/www/auth
        run: |
          gcloud compute ssh idp-fr-par-1 \
            --project privasys-production \
            --zone europe-west9-a \
            --tunnel-through-iap \
            --command "
              set -e
              TS=\$(date +%s)
              for B in privasys-auth-frame.iife.js privasys-auth-client.iife.js; do
                if [ -f /var/www/auth/\$B ]; then
                  sudo cp /var/www/auth/\$B /var/www/auth/\$B.bak.\$TS
                fi
                sudo cp /tmp/\$B     /var/www/auth/\$B
                sudo cp /tmp/\$B.map /var/www/auth/\$B.map
                sudo chown root:root /var/www/auth/\$B /var/www/auth/\$B.map
                sudo chmod 644       /var/www/auth/\$B /var/www/auth/\$B.map
                # Keep only the 5 most recent backups per bundle
                sudo bash -c \"ls -1t /var/www/auth/\$B.bak.* 2>/dev/null | tail -n +6 | xargs -r rm -f\"
                rm -f /tmp/\$B /tmp/\$B.map
              done
            "

      - name: Smoke test hosted bundles
        run: |
          for B in privasys-auth-frame.iife.js privasys-auth-client.iife.js; do
            STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
              "https://privasys.id/auth/$B")
            echo "$B: HTTP $STATUS"
            test "$STATUS" = "200"
          done
          # Sanity check: the client bundle MUST export getTokenForAudience.
          # If this fails the hosted copy has drifted (see sdk-v0.3.7 note).
          curl -sS "https://privasys.id/auth/privasys-auth-client.iife.js" \
            | grep -q "getTokenForAudience" \
            || (echo "::error::client bundle missing getTokenForAudience" && exit 1)
